[project]
name = "wii-arena-dolphin"
version = "0.1.0"
description = ""
readme = "wii_arena/dolphin/README.md"
requires-python = ">=3.14"
dependencies = ["pydantic>=2.13.4", "wii-arena-core", "wii-arena-dlpack"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.packages.find]
include = ["wii_arena.dolphin*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.uv.sources]
wii-arena-core = { workspace = true }
wii-arena-dlpack = { workspace = true }
