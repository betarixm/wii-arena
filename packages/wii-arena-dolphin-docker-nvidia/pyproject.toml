[project]
name = "wii-arena-dolphin-docker-nvidia"
version = "0.1.0"
description = ""
readme = "wii_arena/dolphin_docker_nvidia/README.md"
requires-python = ">=3.14"
dependencies = ["wii-arena-dolphin-docker", "wii-arena-cuda-driver"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.packages.find]
include = ["wii_arena.dolphin_docker_nvidia*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed", "xorg.conf"]

[tool.uv.sources]
wii-arena-dolphin-docker = { workspace = true }
