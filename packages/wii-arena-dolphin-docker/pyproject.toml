[project]
name = "wii-arena-dolphin-docker"
version = "0.1.0"
description = ""
readme = "wii_arena/dolphin_docker/README.md"
requires-python = "==3.12.*"
dependencies = ["docker>=7.1.0", "wii-arena-dolphin", "wii-arena-dlpack"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.packages.find]
include = ["wii_arena.dolphin_docker*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.uv.sources]
wii-arena-dolphin = { workspace = true }
wii-arena-dlpack = { workspace = true }
