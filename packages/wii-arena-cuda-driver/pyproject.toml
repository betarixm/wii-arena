[project]
name = "wii-arena-cuda-driver"
version = "0.1.0"
description = ""
readme = "wii_arena/cuda_driver/README.md"
requires-python = "==3.12.*"
dependencies = ["cupy-cuda13x>=14.1.0", "wii-arena-dlpack"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.packages.find]
include = ["wii_arena.cuda_driver*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.uv.sources]
wii-arena-dlpack = { workspace = true }
